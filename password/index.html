<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CipherCheck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🔐 CipherCheck</h1>
  <p class="subtitle">Smart Password Security Analyzer</p>

  <div class="card">
    
    <div class="input-group">
      <input type="password" id="password" placeholder="Enter password..." />
      <button class="toggle" onclick="togglePassword()">👁</button>
    </div>

    <div class="strength-bar">
      <div id="strength-fill"></div>
    </div>
    <p id="strength-text">Strength: -</p>

    <ul class="rules">
      <li id="length">• At least 8 characters</li>
      <li id="upper">• Uppercase letter</li>
      <li id="lower">• Lowercase letter</li>
      <li id="number">• Number</li>
      <li id="symbol">• Special character</li>
    </ul>

    <div class="buttons">
      <button onclick="generatePassword()">Generate</button>
      <button onclick="copyPassword()">Copy</button>
    </div>

    <p id="copy-msg"></p>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
